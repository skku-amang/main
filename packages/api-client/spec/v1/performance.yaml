openapi: 3.1.0
info:
  title: AMANG Performance Domain
  version: 0.1.0

# Performance 도메인의 paths + components.
# 다른 도메인 yaml은 ../_shared.yaml만 참조 (cross-domain 의존 최소화).
# Team/Session/User 등 다른 도메인 모델은 PoC 단계에서 inline 정의 — Phase 2 도메인 마이그레이션 시
# 각 도메인 yaml로 이동 후 $ref로 변환.

paths:
  /performances:
    get:
      operationId: getPerformances
      tags: [Performance]
      summary: 공연 목록 조회
      security: []
      responses:
        "200":
          description: 공연 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Performance"
        "500":
          $ref: ../_shared.yaml#/components/responses/InternalServer500

    post:
      operationId: createPerformance
      tags: [Performance]
      summary: 공연 생성 (운영진)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerformanceCreate"
      responses:
        "201":
          description: 공연 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceDetail"
        "400":
          description: 입력값 검증 실패 또는 도메인 규칙 위반
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../_shared.yaml#/components/schemas/ValidationProblem
                  - $ref: "#/components/schemas/InvalidPerformanceDateProblem"
        "401":
          $ref: ../_shared.yaml#/components/responses/Unauthorized401
        "403":
          $ref: ../_shared.yaml#/components/responses/Forbidden403
        "500":
          $ref: ../_shared.yaml#/components/responses/InternalServer500

  /performances/{id}:
    parameters:
      - $ref: "#/components/parameters/PerformanceId"

    get:
      operationId: getPerformanceById
      tags: [Performance]
      summary: 공연 상세 조회
      security: []
      responses:
        "200":
          description: 공연 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceDetail"
        "404":
          $ref: ../_shared.yaml#/components/responses/NotFound404
        "500":
          $ref: ../_shared.yaml#/components/responses/InternalServer500

    patch:
      operationId: updatePerformance
      tags: [Performance]
      summary: 공연 수정 (운영진)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerformanceUpdate"
      responses:
        "200":
          description: 수정된 공연
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceDetail"
        "400":
          description: 입력값 검증 실패 또는 도메인 규칙 위반
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ../_shared.yaml#/components/schemas/ValidationProblem
                  - $ref: "#/components/schemas/InvalidPerformanceDateProblem"
        "401":
          $ref: ../_shared.yaml#/components/responses/Unauthorized401
        "403":
          $ref: ../_shared.yaml#/components/responses/Forbidden403
        "404":
          $ref: ../_shared.yaml#/components/responses/NotFound404
        "500":
          $ref: ../_shared.yaml#/components/responses/InternalServer500

    delete:
      operationId: deletePerformance
      tags: [Performance]
      summary: 공연 삭제 (운영진)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 삭제된 공연
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceDetail"
        "401":
          $ref: ../_shared.yaml#/components/responses/Unauthorized401
        "403":
          $ref: ../_shared.yaml#/components/responses/Forbidden403
        "404":
          $ref: ../_shared.yaml#/components/responses/NotFound404
        "500":
          $ref: ../_shared.yaml#/components/responses/InternalServer500

  /performances/{id}/teams:
    parameters:
      - $ref: "#/components/parameters/PerformanceId"

    get:
      operationId: getTeamsByPerformance
      tags: [Performance]
      summary: 공연에 속한 팀 목록 조회 (세션·멤버 포함)
      security: []
      responses:
        "200":
          description: 팀 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamWithSessionsAndMembers"
        "404":
          $ref: ../_shared.yaml#/components/responses/NotFound404
        "500":
          $ref: ../_shared.yaml#/components/responses/InternalServer500

components:
  parameters:
    PerformanceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    # ─── 도메인 specific Problem ────────────────────────────────
    InvalidPerformanceDateProblem:
      allOf:
        - $ref: ../_shared.yaml#/components/schemas/ProblemBase
        - type: object
          required: [type, status]
          properties:
            type:
              type: string
              const: /errors/performance/invalid-performance-date
            status:
              type: integer
              const: 400

    # ─── 핵심 모델 ─────────────────────────────────────────────
    Performance:
      type: object
      required:
        - id
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: [string, "null"]
        image:
          type: [string, "null"]
        location:
          type: [string, "null"]
        startAt:
          type: [string, "null"]
          format: date-time
        endAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PerformanceDetail:
      allOf:
        - $ref: "#/components/schemas/Performance"
        - type: object
          required: [teams]
          properties:
            teams:
              type: array
              items:
                $ref: "#/components/schemas/TeamWithLeader"

    # ─── 요청 바디 ─────────────────────────────────────────────
    PerformanceCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: [string, "null"]
        image:
          type: [string, "null"]
        location:
          type: [string, "null"]
        startAt:
          type: [string, "null"]
          format: date-time
        endAt:
          type: [string, "null"]
          format: date-time

    PerformanceUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: [string, "null"]
        image:
          type: [string, "null"]
        location:
          type: [string, "null"]
        startAt:
          type: [string, "null"]
          format: date-time
        endAt:
          type: [string, "null"]
          format: date-time

    # ─── Cross-domain 모델 (Phase 2 마이그레이션 시 각 도메인으로 이동) ──
    SessionName:
      type: string
      enum: [VOCAL, GUITAR, BASS, SYNTH, DRUM, STRINGS, WINDS]

    PublicUserSession:
      type: object
      required: [id, name]
      properties:
        id: { type: integer }
        name: { $ref: "#/components/schemas/SessionName" }

    PublicUserGeneration:
      type: object
      required: [id, order]
      properties:
        id: { type: integer }
        order: { type: integer }

    PublicUser:
      type: object
      required: [id, name, nickname, sessions, generation]
      properties:
        id: { type: integer }
        name: { type: string }
        nickname: { type: string }
        bio:
          type: [string, "null"]
        image:
          type: [string, "null"]
        generation:
          $ref: "#/components/schemas/PublicUserGeneration"
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/PublicUserSession"

    Team:
      type: object
      required:
        - id
        - name
        - songName
        - songArtist
        - isFreshmenFixed
        - isSelfMade
        - createdAt
        - updatedAt
        - performanceId
      properties:
        id: { type: integer }
        name: { type: string }
        description:
          type: [string, "null"]
        image:
          type: [string, "null"]
        songName: { type: string }
        songArtist: { type: string }
        isFreshmenFixed: { type: boolean }
        isSelfMade: { type: boolean }
        songYoutubeVideoUrl:
          type: [string, "null"]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        performanceId: { type: integer }
        leaderId: { type: integer }

    TeamSession:
      type: object
      required: [id, capacity, teamId, sessionId, createdAt, updatedAt]
      properties:
        id: { type: integer }
        capacity: { type: integer }
        teamId: { type: integer }
        sessionId: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Session:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { $ref: "#/components/schemas/SessionName" }
        icon:
          type: [string, "null"]
        leaderId:
          type: [integer, "null"]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TeamMember:
      type: object
      required: [id, index, teamSessionId, userId, createdAt, updatedAt, user]
      properties:
        id: { type: integer }
        index: { type: integer }
        teamSessionId: { type: integer }
        userId: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        user:
          $ref: "#/components/schemas/PublicUser"

    TeamSessionWithSessionAndMembers:
      allOf:
        - $ref: "#/components/schemas/TeamSession"
        - type: object
          required: [session, members]
          properties:
            session:
              $ref: "#/components/schemas/Session"
            members:
              type: array
              items:
                $ref: "#/components/schemas/TeamMember"

    TeamWithLeader:
      allOf:
        - $ref: "#/components/schemas/Team"
        - type: object
          required: [leader, teamSessions]
          properties:
            leader:
              $ref: "#/components/schemas/PublicUser"
            teamSessions:
              type: array
              items:
                $ref: "#/components/schemas/TeamSession"

    TeamWithSessionsAndMembers:
      allOf:
        - $ref: "#/components/schemas/Team"
        - type: object
          required: [leader, teamSessions]
          properties:
            leader:
              $ref: "#/components/schemas/PublicUser"
            teamSessions:
              type: array
              items:
                $ref: "#/components/schemas/TeamSessionWithSessionAndMembers"
