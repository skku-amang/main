apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  labels:
    app: api
    job-type: migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: api-job
        job-type: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/skku-amang/amang-api:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              export DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${POSTGRES_DB}?schema=public"
              cd packages/database && npx prisma migrate deploy
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: amang-db-credentials
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
