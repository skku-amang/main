# TODO: namespace를 ArgoCD Application에서 지정하고 여기서 제거 검토
# ref: https://github.com/manamana32321/homelab/tree/main/k8s/argocd/applications/apps/amang
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: amang-api-staging

resources:
  - namespace.yaml
  - ../../base
  - ingress.yaml
  - sealed-secret.yaml

patches:
  - patch: |-
      - op: add
        path: /data/S3_ENDPOINT
        value: "https://s3.amang.staging.json-server.win"
      - op: add
        path: /data/NODE_ENV
        value: "development"
      - op: add
        path: /data/DB_HOST
        value: "postgres-svc.amang-db-staging"
    target:
      kind: ConfigMap
      name: api-config
