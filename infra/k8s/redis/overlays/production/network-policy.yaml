apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-api-only
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        # amang API 서버 (production only)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: amang-api-production
          podSelector:
            matchLabels:
              app: api
        # amang migrate/seed Job (production only)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: amang-api-production
          podSelector:
            matchLabels:
              app: api-job
      ports:
        - protocol: TCP
          port: 6379
