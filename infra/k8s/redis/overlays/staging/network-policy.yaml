apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-api-only
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        # amang API 서버 (staging only)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: amang-api-staging
          podSelector:
            matchLabels:
              app: api
        # amang migrate/seed Job (staging only)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: amang-api-staging
          podSelector:
            matchLabels:
              app: api-job
        # Blackbox Exporter (TCP probe로 가용성 모니터링)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus-blackbox-exporter
      ports:
        - protocol: TCP
          port: 6379
