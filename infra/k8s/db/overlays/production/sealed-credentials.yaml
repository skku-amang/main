---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: amang-db-credentials
  namespace: amang-db-production
spec:
  encryptedData:
    DATABASE_URL: 
    POSTGRES_DB: 
    POSTGRES_PASSWORD: 
    POSTGRES_USER: 
  template:
    metadata:
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: amang-api-production,cloudbeaver
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: amang-api-production,cloudbeaver
      name: amang-db-credentials
      namespace: amang-db-production
    type: Opaque
