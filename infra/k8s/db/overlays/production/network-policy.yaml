apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-api-only
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        # amang API 서버 (production only)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: amang-api-production
          podSelector:
            matchLabels:
              app: api
        # amang migrate/seed Job (production only)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: amang-api-production
          podSelector:
            matchLabels:
              app: api-job
        # CloudBeaver (DB 관리 UI)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudbeaver
          podSelector:
            matchLabels:
              app: cloudbeaver
      ports:
        - protocol: TCP
          port: 5432
